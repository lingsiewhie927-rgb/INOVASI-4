        .choice-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .choice-btn:active { transform: scale(0.97); }
        .battlefield { position: relative; width: 100%; display: flex; justify-content: center; align-items: center; overflow: visible; }

        @keyframes pull-feedback { 0% { transform: scale(1) rotate(0deg); } 50% { transform: scale(1.05) rotate(-2deg); } 100% { transform: scale(1) rotate(0deg); } }
        .pull-anim { animation: pull-feedback 0.3s ease-out; }
        .character { transition: all 0.4s cubic-bezier(0.34, 1.2, 0.64, 1); filter: drop-shadow(0 12px 18px rgba(0,0,0,0.2)); flex-shrink: 0; width: 140px; display: flex; justify-content: center; align-items: center; }
        .character svg { width: 130px; height: auto; pointer-events: none; }
        .modal-overlay { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(10px); display: none; position: fixed; inset: 0; z-index: 1000; align-items: center; justify-content: center; }
        @keyframes float { 0%, 100% { transform: translateY(0) rotate(var(--base-rot)); } 50% { transform: translateY(-8px) rotate(var(--base-rot)); } }
        .idle-float { animation: float 4s infinite ease-in-out; }
        .table-wrapper { max-height: 400px; overflow-y: auto; border-radius: 20px; border: 2px solid #e2e8f0; }
        .edit-table th { background: #f8fafc; font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: #334155; }
        .batch-panel { background: #fefce8; border-radius: 1.5rem; padding: 1rem; margin-bottom: 1rem; border: 2px solid #fde047; }
        .password-eye { cursor: pointer; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); user-select: none; }
        .lock-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; backdrop-filter: blur(12px); }

<script>
(function(){

    // ==================== 智能文本规范化函数 ====================
    // 用于彻底解决空格、全角、不可见字符导致的判题错误
    function normalizeText(str) {
        if (!str) return '';
        // 转为字符串
        let s = String(str);
        // 移除零宽空格、零宽连接符等不可见字符
        s = s.replace(/[\u200B-\u200D\uFEFF]/g, '');
        // 全角英文字母/数字转半角
        s = s.replace(/[Ａ-Ｚａ-ｚ０-９]/g, function(c) {
            return String.fromCharCode(c.charCodeAt(0) - 0xFEE0);
        });
        // 全角空格转半角空格
        s = s.replace(/　/g, ' ');
        // 移除所有控制字符（除了普通空格）
        s = s.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
        // 将连续空白（包括空格、制表符、换行）替换为一个普通空格
        s = s.replace(/\s+/g, ' ');
        // 去除首尾空格
        return s.trim();
    }
    
    // 比较两个字符串是否相等（已规范化）
    function isAnswerEqual(userAns, correctAns) {
        return normalizeText(userAns) === normalizeText(correctAns);
    }
    
    // ==================== 默认题库 ====================
    const DEFAULT_QUESTIONS = [{"q":"太阳可以提供我们什么？","a":"衣服","b":"玩具","c":"光和热","d":"冰淇淋","correct":"光和热"},{"q":"在马来西亚，哪种天气最常见？","a":"下雪","b":"阳光充足","c":"结冰","d":"龙卷风","correct":"阳光充足"},{"q":"什么东西在天空中吹动，可以转动大风车？","a":"雨","b":"云","c":"风","d":"鸟","correct":"风"},{"q":"大海里的水一波一波地动，这叫什么？","a":"游泳","b":"海浪","c":"喝水","d":"冲凉","correct":"海浪"},{"q":"什么是可更新能源？","a":"很快用完的东西","b":"不会用完的自然能源","c":"很难找的东西","d":"垃圾桶","correct":"不会用完的自然能源"},{"q":"哪种东西不是来自大自然的能源？","a":"太阳","b":"风","c":"塑料袋","d":"运行的水","correct":"塑料袋"},{"q":"太阳能板（Solar Panel）是用来做什么的？","a":"收集阳光发电","b":"挡雨","c":"煮饭","d":"照镜子","correct":"收集阳光发电"},{"q":"水力发电是利用什么来发电？","a":"泥土","b":"流动的水","c":"木头","d":"石头","correct":"流动的水"},{"q":"为什么我们要节约用电？","a":"为了好玩","b":"为了保护地球","c":"为了浪费钱","d":"为了让天变黑","correct":"为了保护地球"},{"q":"如果我们一直浪费石油，石油会怎样？","a":"越来越多","b":"会用完","c":"变成水","d":"不会变","correct":"会用完"},{"q":"哪种能源是比较干净、不污染空气的？","a":"黑烟","b":"煤炭","c":"太阳能","d":"废气","correct":"太阳能"},{"q":"大风车（风力发电机）通常建在什么地方？","a":"房间里","b":"风很大的地方","c":"地洞里","d":"电影院","correct":"风很大的地方"},{"q":"植物和动物的废料可以变成能源吗？","a":"可以","b":"不可以","c":"不知道","d":"没可能","correct":"可以"},{"q":"为了让空气更清新，我们应该支持什么？","a":"烧垃圾","b":"种树和用绿能源","c":"排黑烟","d":"砍树","correct":"种树和用绿能源"},{"q":"地球的深处其实是很热的，对吗？","a":"对","b":"不对","c":"很冷","d":"像冰块","correct":"对"}];
    
    // ==================== 密码系统 (原样保留) ====================
    let passwordUnlocked = false, remainingAttempts = 5, isWaiting = false, waitTimeout = null, pendingModalId = null, globalLocked = false;
    let currentPassword = localStorage.getItem('zootopia_admin_pwd') || "0987";
    function savePasswordToLocal(pwd) { localStorage.setItem('zootopia_admin_pwd', pwd); currentPassword = pwd; }
    function processWrongPassword() { if(globalLocked) return; remainingAttempts--; updateAttemptsDisplay(); if(remainingAttempts <= 0) permanentLock(); else startWaitPenalty(5);}
    function startWaitPenalty(seconds) { if(isWaiting) return; isWaiting=true; let remain=seconds; const updateTimer=()=>{ const span=document.getElementById('wait-timer'); if(span) span.innerText = `⏳ 等待 ${remain}s`; if(remain<=0) clearWaitState(); else { waitTimeout=setTimeout(()=>{ remain--; updateTimer(); },1000); } }; updateTimer();}
    function clearWaitState() { if(waitTimeout) clearTimeout(waitTimeout); waitTimeout=null; isWaiting=false; const w=document.getElementById('wait-timer'); if(w) w.innerText=''; document.getElementById('confirm-pwd-btn').disabled=false; document.getElementById('password-input').disabled=false; document.getElementById('confirm-change-btn').disabled=false; }
    function updateAttemptsDisplay() { const a=document.getElementById('attempts-left'); if(a) a.innerText=`剩余次数: ${remainingAttempts}`; if(remainingAttempts<=0) permanentLock();}
    function permanentLock() { if(globalLocked) return; globalLocked=true; passwordUnlocked=false; document.getElementById('global-lock').style.display='flex'; ['timeBtn','quizBtn','changePwdBtn','generateHtmlBtn','startBtn','resetBtn'].forEach(id=>{ const btn=document.getElementById(id); if(btn) btn.disabled=true; });}
    function verifyPasswordAndUnlock(inputPwd, onSuccess) { if(globalLocked) return false; if(isWaiting){ alert("等待惩罚结束"); return false; } if(inputPwd===currentPassword){ remainingAttempts=5; updateAttemptsDisplay(); passwordUnlocked=true; clearWaitState(); if(onSuccess) onSuccess(); return true;} else { processWrongPassword(); return false; }}
    function showPasswordModal(modalId){ if(globalLocked) return; pendingModalId=modalId; document.getElementById('password-modal').style.display='flex'; document.getElementById('password-input').value='';}
    function closePasswordModal(){ document.getElementById('password-modal').style.display='none'; pendingModalId=null;}
    function handlePasswordConfirm(){ const entered=document.getElementById('password-input').value; verifyPasswordAndUnlock(entered,()=>{ document.getElementById('password-modal').style.display='none'; if(pendingModalId){ document.getElementById(pendingModalId).style.display='flex'; pendingModalId=null; }});}
    function openChangePwdModal(){ if(globalLocked) return; if(!passwordUnlocked){ showPasswordModal('change-pwd-modal'); return;} document.getElementById('change-pwd-modal').style.display='flex';}
    function closeChangePwdModal(){ document.getElementById('change-pwd-modal').style.display='none';}
    function handleChangePassword(){ if(globalLocked) return; if(isWaiting){ alert("请等待"); return;} const cur=document.getElementById('current-pwd').value, newp=document.getElementById('new-pwd').value, conf=document.getElementById('confirm-pwd').value; if(cur!==currentPassword){ processWrongPassword(); alert("当前密码错误"); return;} if(!newp||newp.length<4){ alert("新密码至少4位"); return;} if(newp!==conf){ alert("不一致"); return;} savePasswordToLocal(newp); alert("修改成功"); closeChangePwdModal(); passwordUnlocked=true;}
    document.getElementById('confirm-pwd-btn').onclick=handlePasswordConfirm;
    document.getElementById('cancel-pwd-btn').onclick=closePasswordModal;
    document.getElementById('toggle-password').onclick=()=>{ let inp=document.getElementById('password-input'); inp.type=inp.type==='password'?'text':'password'; };
    document.getElementById('toggle-current').onclick=()=>{ let inp=document.getElementById('current-pwd'); inp.type=inp.type==='password'?'text':'password'; };
    document.getElementById('toggle-new').onclick=()=>{ let inp=document.getElementById('new-pwd'); inp.type=inp.type==='password'?'text':'password'; };
    document.getElementById('toggle-confirm').onclick=()=>{ let inp=document.getElementById('confirm-pwd'); inp.type=inp.type==='password'?'text':'password'; };
    document.getElementById('confirm-change-btn').onclick=handleChangePassword;
    document.getElementById('cancel-change-btn').onclick=closeChangePwdModal;
    document.getElementById('changePwdBtn').onclick=openChangePwdModal;
    document.getElementById('timeBtn').onclick=()=>{ if(globalLocked) return; if(passwordUnlocked) document.getElementById('time-modal').style.display='flex'; else showPasswordModal('time-modal'); };
    document.getElementById('quizBtn').onclick=()=>{ if(globalLocked) return; if(passwordUnlocked){ document.getElementById('ques-modal').style.display='flex'; refreshTableDisplay();} else showPasswordModal('ques-modal'); };
    
    // ==================== 时长管理 ====================
    const timeInput = document.getElementById('setup-time');
    function loadSavedTime() {
        const saved = localStorage.getItem('zootopia_game_duration');
        let defaultVal = 240;
        if(saved) { let parsed = parseInt(saved); if(!isNaN(parsed) && parsed>=10 && parsed<=600) defaultVal=parsed; }
        timeInput.value = defaultVal;
        if(gameState && !gameState.active) { gameState.maxTime = defaultVal; gameState.timeLeft = defaultVal; updateTimerDisplay(); }
    }
    document.getElementById('saveTimeBtn').onclick = () => {
        let val = parseInt(timeInput.value); if(isNaN(val)) val=240;
        val = Math.min(600, Math.max(10, val));
        timeInput.value = val;
        localStorage.setItem('zootopia_game_duration', val);
        if(gameState && !gameState.active) { gameState.maxTime = val; gameState.timeLeft = val; updateTimerDisplay(); }
        document.getElementById('time-modal').style.display = 'none';
        alert(`时长已设为 ${val} 秒${val===240 ? ' (4分钟)' : ''}`);
    };
    
    // ==================== 游戏状态 ====================
    let gameState = { pool: [], team1Remaining: [], team2Remaining: [], score1:0, score2:0, timeLeft:240, maxTime:240, active:false, ropePos:0, timerInterval:null, gameLog:{team1:[],team2:[]}, pendingTimeouts:[] };
    
    const domGame = {
        timer: document.getElementById('timer'), q1: document.getElementById('q1'), q2: document.getElementById('q2'),
        o1: document.getElementById('opts1'), o2: document.getElementById('opts2'), rope: document.getElementById('rope-move-container'),
        gameOver: document.getElementById('game-over'), winText: document.getElementById('winner-text'), finalRes: document.getElementById('final-stats'),
        score1: document.getElementById('score1'), score2: document.getElementById('score2'),
        charJudy: document.getElementById('char-blue'), charNick: document.getElementById('char-red'),
        tableBody: document.getElementById('questions-table-body'), judyReport: document.getElementById('judy-report'), nickReport: document.getElementById('nick-report'),
        downloadBtn: document.getElementById('downloadPdfBtn'), playAgainBtn: document.getElementById('playAgainBtn')
    };
    function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
    
    // ==================== 题库表格操作 (强化数据清洗) ====================
    function addQuestionRow(prefill = null){
        const row = document.createElement('tr'); row.className = 'border-b';
        const vals = prefill || { q: '', a: '', b: '', c: '', d: '', correct: '' };
        row.innerHTML = `<td class="p-2"><input type="text" value="${escapeHtml(vals.q)}" class="question-input w-full"></td>
                         <td class="p-2"><input type="text" value="${escapeHtml(vals.a)}" class="opt-a w-full"></td>
                         <td class="p-2"><input type="text" value="${escapeHtml(vals.b)}" class="opt-b w-full"></td>
                         <td class="p-2"><input type="text" value="${escapeHtml(vals.c)}" class="opt-c w-full"></td>
                         <td class="p-2"><input type="text" value="${escapeHtml(vals.d)}" class="opt-d w-full"></td>
                         <td class="p-2"><select class="correct-select w-full"></select></td>
                         <td class="p-2 text-center"><button class="del-row text-red-400 font-bold text-lg">🗑️</button></td>`;
        domGame.tableBody.appendChild(row);
        const select = row.querySelector('.correct-select');
        const inps = [row.querySelector('.opt-a'), row.querySelector('.opt-b'), row.querySelector('.opt-c'), row.querySelector('.opt-d')];
        const updateSelect = () => {
            const current = select.value;
            // 规范化选项文本后放入下拉框
            const opts = inps.map(inp => normalizeText(inp.value));
            select.innerHTML = opts.map((opt, idx) => `<option value="${escapeHtml(opt)}">${String.fromCharCode(65+idx)}: ${escapeHtml(opt)}</option>`).join('');
            if(opts.includes(current)) select.value = current;
            else if(opts.includes(normalizeText(vals.correct))) select.value = normalizeText(vals.correct);
        };
        inps.forEach(i=>i.addEventListener('input', updateSelect));
        updateSelect();
        row.querySelector('.del-row').onclick = ()=>row.remove();
        return row;
    }
    function resetDefaultTable(){ domGame.tableBody.innerHTML=''; DEFAULT_QUESTIONS.forEach(q=> addQuestionRow({q:q.q, a:q.a, b:q.b, c:q.c, d:q.d, correct:q.correct})); }
    function collectTableData(){ 
        return Array.from(domGame.tableBody.querySelectorAll('tr')).map(row=>{
            let opts = [
                normalizeText(row.querySelector('.opt-a').value),
                normalizeText(row.querySelector('.opt-b').value),
                normalizeText(row.querySelector('.opt-c').value),
                normalizeText(row.querySelector('.opt-d').value)
            ];
            return {
                q: normalizeText(row.querySelector('.question-input').value),
                options: opts,
                correct: normalizeText(row.querySelector('.correct-select').value)
            };
        }).filter(q=>q.q && q.options.every(o=>o));
    }
    function refreshTableDisplay(){ if(domGame.tableBody.children.length===0) resetDefaultTable(); }
    function saveTableAndClose(){ gameState.pool = collectTableData(); if(gameState.pool.length===0){ resetDefaultTable(); gameState.pool=collectTableData(); } document.getElementById('ques-modal').style.display='none'; alert("题库已保存 (已自动清理空格和不可见字符)"); }
    document.getElementById('saveQuesBtn').onclick = saveTableAndClose;
    document.getElementById('addRowBtn').onclick = ()=>addQuestionRow();
    document.getElementById('resetTableBtn').onclick = resetDefaultTable;
    document.getElementById('batchOpenBtn').onclick = ()=>document.getElementById('batch-panel').classList.remove('hidden');
    document.getElementById('closeBatchBtn').onclick = ()=>document.getElementById('batch-panel').classList.add('hidden');
    document.getElementById('clearBatchBtn').onclick = ()=>document.getElementById('batch-text').value='';
    document.getElementById('importBatchBtn').onclick = ()=>{
        const raw = document.getElementById('batch-text').value;
        if(!raw.trim()) return alert("粘贴数据");
        const lines = raw.split(/\r?\n/);
        let added=0;
        for(let line of lines){
            line=line.trim(); if(!line) continue;
            let parts=line.split('|').map(s=>s.trim());
            if(parts.length<6){ alert(`字段不足: ${line}`); continue; }
            let [q,a,b,c,d,correct] = parts;
            if(!q||!a||!b||!c||!d||!correct) continue;
            if(![a,b,c,d].includes(correct)){ alert(`正确选项错误: ${correct}`); continue; }
            addQuestionRow({q,a,b,c,d,correct});
            added++;
        }
        alert(`批量添加 ${added} 题 (已自动规范化)`);
        document.getElementById('batch-text').value='';
        document.getElementById('batch-panel').classList.add('hidden');
    };
    
    // ==================== 拔河游戏核心 ====================
    const PULL_STEP=22, MAX_SHIFT=150;
    function clearAllTimeouts(){ gameState.pendingTimeouts.forEach(id=>clearTimeout(id)); gameState.pendingTimeouts=[]; }
    function addTimeout(fn,delay){ const id=setTimeout(()=>{ fn(); gameState.pendingTimeouts=gameState.pendingTimeouts.filter(t=>t!==id); },delay); gameState.pendingTimeouts.push(id); return id; }
    function updateScoresAndRope(){ domGame.score1.textContent=gameState.score1; domGame.score2.textContent=gameState.score2; gameState.ropePos=Math.max(-MAX_SHIFT,Math.min(MAX_SHIFT,gameState.ropePos)); domGame.rope.style.transform=`translateX(${gameState.ropePos}px)`; if(gameState.active && Math.abs(gameState.ropePos)>=MAX_SHIFT) endGame(); }
    function formatTime(sec){ return `${Math.floor(sec/60).toString().padStart(2,'0')}:${(sec%60).toString().padStart(2,'0')}`; }
    function updateTimerDisplay(){ domGame.timer.textContent=formatTime(gameState.timeLeft); }
    function animatePull(el){ el.classList.remove('idle-float'); el.classList.add('pull-anim'); addTimeout(()=>{ if(el){ el.classList.remove('pull-anim'); el.classList.add('idle-float'); } },400); }
    function takeRandomQuestion(team) { const remaining=team===1?gameState.team1Remaining:gameState.team2Remaining; if(!remaining.length) return null; const idx=Math.floor(Math.random()*remaining.length); const q=remaining[idx]; remaining.splice(idx,1); return q; }
    function renderQuestion(team){
        if(!gameState.active) return;
        const item=takeRandomQuestion(team);
        if(!item){ const qBox=team===1?domGame.q1:domGame.q2; qBox.textContent=team===1?"🐰 朱迪已完成所有题目":"🦊 尼克已完成所有题目"; (team===1?domGame.o1:domGame.o2).innerHTML='<div class="text-center p-4">✨ 已答完 ✨</div>'; if(gameState.active && gameState.team1Remaining.length===0 && gameState.team2Remaining.length===0) endGame(); return; }
        const qBox=team===1?domGame.q1:domGame.q2, optsBox=team===1?domGame.o1:domGame.o2;
        qBox.textContent=item.q; optsBox.innerHTML='';
        // 随机打乱选项，保留原始文本（已经规范化）
        const shuffled = [...item.options].sort(()=>Math.random()-0.5);
        shuffled.forEach(opt=>{ 
            const btn=document.createElement('button'); 
            btn.className='choice-btn w-full p-3.5 rounded-2xl font-bold text-sm bg-white border-b-4 border-slate-200 hover:bg-slate-50'; 
            btn.textContent=opt; 
            btn.onclick=()=>handleAnswer(team, opt, item.correct, btn, item.q); 
            optsBox.appendChild(btn); 
        });
    }
    // 核心判题函数 - 使用规范化比较
    function handleAnswer(team, selectedOpt, correctAnswer, btn, questionText){
        if(!gameState.active) return;
        const optsBox=team===1?domGame.o1:domGame.o2;
        optsBox.querySelectorAll('button').forEach(b=>b.disabled=true);
        
        const isCorrect = isAnswerEqual(selectedOpt, correctAnswer);
        
        // 控制台输出详细比较日志（方便检查）
        console.group(`📌 判题详情 - ${team===1?'朱迪':'尼克'}`);
        console.log(`题目: ${questionText}`);
        console.log(`用户点击: "${selectedOpt}" → 规范化: "${normalizeText(selectedOpt)}"`);
        console.log(`正确答案: "${correctAnswer}" → 规范化: "${normalizeText(correctAnswer)}"`);
        console.log(`判题结果: ${isCorrect ? '✅ 正确' : '❌ 错误'}`);
        console.groupEnd();
        
        gameState.gameLog[team===1?'team1':'team2'].push({
            question: questionText,
            userAnswer: selectedOpt,
            correctAnswer: correctAnswer,
            isCorrect: isCorrect
        });
        
        if(isCorrect){
            btn.className=`choice-btn w-full p-3.5 rounded-2xl font-bold text-sm text-white border-b-4 ${team===1?'bg-blue-500 border-blue-700':'bg-orange-500 border-orange-700'}`;
            if(team===1){ gameState.score1+=10; gameState.ropePos-=PULL_STEP; animatePull(domGame.charJudy); } 
            else { gameState.score2+=10; gameState.ropePos+=PULL_STEP; animatePull(domGame.charNick); }
            updateScoresAndRope(); 
            addTimeout(()=>renderQuestion(team),500);
        } else {
            btn.className='choice-btn w-full p-3.5 rounded-2xl font-bold text-sm text-white bg-red-500 border-red-700';
            // 找出正确的选项按钮并高亮绿色
            const correctBtn = Array.from(optsBox.querySelectorAll('button')).find(b => isAnswerEqual(b.textContent, correctAnswer));
            if(correctBtn) correctBtn.className='choice-btn w-full p-3.5 rounded-2xl font-bold text-sm text-white bg-green-500 border-green-700 pull-anim';
            addTimeout(()=>renderQuestion(team),1500);
        }
        addTimeout(()=>{ if(gameState.active && gameState.team1Remaining.length===0 && gameState.team2Remaining.length===0) endGame(); },100);
    }
    
    function disableAdminButtons(disabled){ ['timeBtn','quizBtn','changePwdBtn','generateHtmlBtn'].forEach(id=>{ const btn=document.getElementById(id); if(btn) disabled?btn.classList.add('disabled-btn'):btn.classList.remove('disabled-btn'); }); }
    function endGame(){
        if(!gameState.active) return;
        gameState.active=false; clearInterval(gameState.timerInterval); clearAllTimeouts(); disableAdminButtons(false);
        const winner=gameState.ropePos<0?'JUDY':(gameState.ropePos>0?'NICK':'DRAW');
        domGame.winText.textContent=winner==='DRAW'?'🤝 平局！':(winner==='JUDY'?'🐰 朱迪胜利！':'🦊 尼克胜利！');
        domGame.finalRes.textContent=`${gameState.score1} : ${gameState.score2}`;
        const renderReport = (teamKey, container) => {
            const logs = gameState.gameLog[teamKey];
            if(!logs.length){ container.innerHTML='<p class="text-center text-slate-400">无记录</p>'; return; }
            container.innerHTML = '';
            logs.forEach((log, idx) => {
                const div = document.createElement('div');
                div.className = `p-3 rounded-xl mb-2 text-xs border-l-4 ${log.isCorrect ? 'bg-green-100 border-green-500' : 'bg-red-100 border-red-500'}`;
                div.innerHTML = `<p class="font-bold">${idx+1}. ${escapeHtml(log.question)}</p>
                                 <p>你的答案: ${escapeHtml(log.userAnswer)} ${log.isCorrect ? '✓' : '✗'}</p>
                                 ${!log.isCorrect ? `<p class="text-slate-500">正确答案: ${escapeHtml(log.correctAnswer)}</p>` : ''}`;
                container.appendChild(div);
            });
        };
        renderReport('team1', domGame.judyReport);
        renderReport('team2', domGame.nickReport);
        domGame.gameOver.classList.remove('hidden');
        domGame.playAgainBtn.disabled=true; domGame.playAgainBtn.classList.add('opacity-50','cursor-not-allowed');
        domGame.downloadBtn.onclick = downloadPDFReport;
    }
    
    async function downloadPDFReport() {
        const winnerText = domGame.winText.innerText;
        const scoreText = domGame.finalRes.innerText;
        const judyContainer = document.getElementById('judy-report');
        const nickContainer = document.getElementById('nick-report');
        const judyClone = judyContainer.cloneNode(true);
        const nickClone = nickContainer.cloneNode(true);
        judyClone.style.maxHeight = 'none';
        judyClone.style.overflow = 'visible';
        nickClone.style.maxHeight = 'none';
        nickClone.style.overflow = 'visible';
        
        const container = document.createElement('div');
        container.style.fontFamily = "'Inter', sans-serif";
        container.style.padding = '2rem';
        container.style.backgroundColor = 'white';
        container.style.maxWidth = '1000px';
        container.style.margin = '0 auto';
        
        const headerDiv = document.createElement('div');
        headerDiv.style.textAlign = 'center';
        headerDiv.style.marginBottom = '2rem';
        headerDiv.innerHTML = `
            <h1 style="font-size:2.5rem; font-weight:900;">🐰 vs 🦊 拔河战报</h1>
            <p style="color:#475569;">${new Date().toLocaleString()}</p>
            <div style="background:#f1f5f9; display:inline-block; padding:0.5rem 1.5rem; border-radius:60px; margin-top:0.6rem;">
                <span style="font-weight:900;">🏆 ${winnerText} ${scoreText}</span>
            </div>
        `;
        container.appendChild(headerDiv);
        
        const flexRow = document.createElement('div');
        flexRow.style.display = 'flex';
        flexRow.style.flexWrap = 'wrap';
        flexRow.style.gap = '1.5rem';
        flexRow.style.justifyContent = 'center';
        
        const judyCard = document.createElement('div');
        judyCard.style.flex = '1';
        judyCard.style.minWidth = '280px';
        judyCard.style.backgroundColor = '#eff6ff';
        judyCard.style.borderRadius = '24px';
        judyCard.style.padding = '1rem';
        judyCard.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)';
        const judyTitle = document.createElement('h4');
        judyTitle.style.fontWeight = '900';
        judyTitle.style.color = '#1e3a8a';
        judyTitle.style.fontSize = '1.25rem';
        judyTitle.style.marginBottom = '0.75rem';
        judyTitle.innerHTML = '🐰 朱迪的答题卡';
        judyCard.appendChild(judyTitle);
        judyCard.appendChild(judyClone);
        
        const nickCard = document.createElement('div');
        nickCard.style.flex = '1';
        nickCard.style.minWidth = '280px';
        nickCard.style.backgroundColor = '#fff7ed';
        nickCard.style.borderRadius = '24px';
        nickCard.style.padding = '1rem';
        nickCard.style.boxShadow = '0 4px 12px rgba(0,0,0,0.1)';
        const nickTitle = document.createElement('h4');
        nickTitle.style.fontWeight = '900';
        nickTitle.style.color = '#c2410c';
        nickTitle.style.fontSize = '1.25rem';
        nickTitle.style.marginBottom = '0.75rem';
        nickTitle.innerHTML = '🦊 尼克的答题卡';
        nickCard.appendChild(nickTitle);
        nickCard.appendChild(nickClone);
        
        flexRow.appendChild(judyCard);
        flexRow.appendChild(nickCard);
        container.appendChild(flexRow);
        
        document.body.appendChild(container);
        try {
            await html2pdf().set({
                margin: [0.5, 0.5, 0.5, 0.5],
                filename: `拔河战报_${Date.now()}.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, backgroundColor: '#ffffff' },
                jsPDF: { unit: 'in', format: 'a4' }
            }).from(container).save();
            domGame.playAgainBtn.disabled = false;
            domGame.playAgainBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            alert("PDF已保存，可再次游戏");
        } catch(e) {
            alert("生成失败: " + e);
        } finally {
            document.body.removeChild(container);
        }
    }
    
    function applyAndStart(){
        if(globalLocked) return;
        if(gameState.active) resetGame(true);
        clearAllTimeouts(); if(gameState.timerInterval) clearInterval(gameState.timerInterval);
        let currentMax = parseInt(timeInput.value);
        if(isNaN(currentMax)) currentMax = 240;
        currentMax = Math.min(600, Math.max(10, currentMax));
        gameState.maxTime = currentMax;
        gameState.timeLeft = currentMax;
        if(!gameState.pool.length){ resetDefaultTable(); gameState.pool=collectTableData(); }
        if(gameState.pool.length===0){ alert("题库为空"); return; }
        // 确保每个question的correct存在于options中
        for(let q of gameState.pool) if(!q.options.includes(q.correct)) q.correct=q.options[0];
        gameState.team1Remaining=gameState.pool.map(q=>({...q, options:[...q.options]}));
        gameState.team2Remaining=gameState.pool.map(q=>({...q, options:[...q.options]}));
        gameState.score1=0; gameState.score2=0; gameState.ropePos=0; gameState.gameLog={team1:[],team2:[]};
        gameState.active=true;
        domGame.gameOver.classList.add('hidden'); updateScoresAndRope(); updateTimerDisplay();
        disableAdminButtons(true);
        renderQuestion(1); renderQuestion(2);
        gameState.timerInterval=setInterval(()=>{ if(!gameState.active) return; gameState.timeLeft--; updateTimerDisplay(); if(gameState.timeLeft<=0){ clearInterval(gameState.timerInterval); endGame(); } },1000);
    }
    function resetGame(){ if(globalLocked) return; gameState.active=false; clearInterval(gameState.timerInterval); clearAllTimeouts(); disableAdminButtons(false); domGame.gameOver.classList.add('hidden'); domGame.score1.textContent='0'; domGame.score2.textContent='0'; domGame.q1.textContent="🐾 准备好了吗？"; domGame.q2.textContent="🦊 来吧！"; domGame.o1.innerHTML=''; domGame.o2.innerHTML=''; domGame.rope.style.transform='translateX(0)'; gameState.score1=0; gameState.score2=0; gameState.ropePos=0; gameState.timeLeft=gameState.maxTime; gameState.gameLog={team1:[],team2:[]}; updateTimerDisplay(); if(gameState.pool.length){ gameState.team1Remaining=gameState.pool.map(q=>({...q, options:[...q.options]})); gameState.team2Remaining=gameState.pool.map(q=>({...q, options:[...q.options]})); } }
    document.getElementById('startBtn').onclick = applyAndStart;
    document.getElementById('resetBtn').onclick = resetGame;
    domGame.playAgainBtn.onclick = () => { if(!domGame.playAgainBtn.disabled) resetGame(); else alert("请先下载战报PDF"); };
    function generateStandaloneHTML(){
        const qs=collectTableData(); if(qs.length===0){ alert("题库空"); return;}
        let t=parseInt(timeInput.value); if(isNaN(t)) t=240;
        alert("生成独立HTML文件 (智能判题版)");
        let htmlSnapshot=document.documentElement.outerHTML;
        const newQs=JSON.stringify(qs.map(q=>({q:q.q, a:q.options[0], b:q.options[1], c:q.options[2], d:q.options[3], correct:q.correct})));
        htmlSnapshot=htmlSnapshot.replace(/const DEFAULT_QUESTIONS = \[[\s\S]*?\];/, `const DEFAULT_QUESTIONS = ${newQs};`);
        htmlSnapshot=htmlSnapshot.replace(/(<input id="setup-time" value=")\d+(")/, `$1${t}$2`);
        const blob=new Blob([htmlSnapshot],{type:'text/html'}); const a=document.createElement('a'); a.download=`zootopia_tug_${Date.now()}.html`; a.href=URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
    }
    document.getElementById('generateHtmlBtn').onclick = () => { if(globalLocked) return; generateStandaloneHTML(); };
    function initGame(){ loadSavedTime(); resetDefaultTable(); gameState.pool=collectTableData(); gameState.team1Remaining=[...gameState.pool]; gameState.team2Remaining=[...gameState.pool]; domGame.gameOver.classList.add('hidden'); updateTimerDisplay(); }
    initGame();
})();
</script>
